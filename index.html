<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incident Commander Training Assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --purple-dark: #3A1D8E;
    --purple-mid: #5B3DC4;
    --purple-light: #7C5CE7;
    --purple-bg: #EDE7F6;
    --green-light: #E8F5E9;
    --green-mid: #C8E6C9;
    --green-accent: #4CAF50;
    --orange-accent: #FF6B35;
    --white: #FFFFFF;
    --gray-light: #F5F5F7;
    --gray-text: #6B7280;
    --dark-text: #1A1A2E;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--gray-light);
    height: 100vh;
    display: flex;
    flex-direction: column;
    color: var(--dark-text);
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--purple-dark) 0%, var(--purple-mid) 50%, var(--purple-light) 100%);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 4px 20px rgba(90, 61, 196, 0.3);
    position: relative;
    z-index: 10;
  }

  .header-icon {
    width: 44px;
    height: 44px;
    background: rgba(255,255,255,0.2);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    backdrop-filter: blur(10px);
  }

  .header-text h1 {
    color: var(--white);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .header-text p {
    color: rgba(255,255,255,0.75);
    font-size: 12px;
    margin-top: 2px;
  }

  .header-badge {
    margin-left: auto;
    background: rgba(255,255,255,0.15);
    color: var(--white);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    backdrop-filter: blur(10px);
    letter-spacing: 0.5px;
  }

  /* Chat area */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .chat-container::-webkit-scrollbar { width: 6px; }
  .chat-container::-webkit-scrollbar-track { background: transparent; }
  .chat-container::-webkit-scrollbar-thumb { background: #D1C4E9; border-radius: 3px; }

  /* Messages */
  .message {
    display: flex;
    gap: 10px;
    max-width: 85%;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.bot { align-self: flex-start; }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }

  .message-avatar {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .message.bot .message-avatar {
    background: linear-gradient(135deg, var(--purple-dark), var(--purple-mid));
    color: white;
  }

  .message.user .message-avatar {
    background: linear-gradient(135deg, var(--green-accent), #66BB6A);
    color: white;
  }

  .message-bubble {
    padding: 14px 18px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    position: relative;
  }

  .message.bot .message-bubble {
    background: var(--white);
    border: 1px solid #E8E0F7;
    border-top-left-radius: 4px;
    box-shadow: 0 2px 8px rgba(90, 61, 196, 0.06);
  }

  .message.user .message-bubble {
    background: linear-gradient(135deg, var(--purple-mid), var(--purple-light));
    color: var(--white);
    border-top-right-radius: 4px;
    box-shadow: 0 2px 8px rgba(90, 61, 196, 0.2);
  }

  .message-bubble h3 {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--purple-dark);
  }

  .message-bubble ul, .message-bubble ol {
    margin: 8px 0;
    padding-left: 20px;
  }

  .message-bubble li { margin-bottom: 6px; }

  .message-bubble code {
    background: var(--purple-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    color: var(--purple-dark);
    font-family: 'SF Mono', Monaco, monospace;
  }

  .message-bubble a {
    color: var(--purple-mid);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .message.user .message-bubble a { color: #E8E0F7; }

  .message-bubble .step-card {
    background: var(--green-light);
    border-left: 3px solid var(--green-accent);
    padding: 10px 14px;
    border-radius: 0 8px 8px 0;
    margin: 8px 0;
    font-size: 13px;
  }

  .message-bubble .step-card strong { color: var(--purple-dark); }

  .message-bubble .alert-card {
    background: #FFF3E0;
    border-left: 3px solid var(--orange-accent);
    padding: 10px 14px;
    border-radius: 0 8px 8px 0;
    margin: 8px 0;
    font-size: 13px;
  }

  .message-bubble table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0;
    font-size: 13px;
  }

  .message-bubble th {
    background: var(--purple-bg);
    color: var(--purple-dark);
    padding: 8px 10px;
    text-align: left;
    font-weight: 600;
    font-size: 12px;
  }

  .message-bubble td {
    padding: 8px 10px;
    border-bottom: 1px solid #F0EBF8;
  }

  .message-bubble tr:last-child td { border-bottom: none; }

  .message-time {
    font-size: 11px;
    color: var(--gray-text);
    margin-top: 4px;
    padding: 0 4px;
  }

  .message.user .message-time { text-align: right; }

  /* Quick actions */
  .quick-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }

  .quick-action-btn {
    background: var(--purple-bg);
    color: var(--purple-dark);
    border: 1px solid #D1C4E9;
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .quick-action-btn:hover {
    background: var(--purple-mid);
    color: var(--white);
    border-color: var(--purple-mid);
    transform: translateY(-1px);
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 8px 0;
  }

  .typing-indicator span {
    width: 8px;
    height: 8px;
    background: #B39DDB;
    border-radius: 50%;
    animation: typing 1.4s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Input area */
  .input-area {
    background: var(--white);
    border-top: 1px solid #E8E0F7;
    padding: 16px 24px;
    display: flex;
    gap: 12px;
    align-items: flex-end;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
  }

  .input-wrapper {
    flex: 1;
    position: relative;
  }

  .input-wrapper textarea {
    width: 100%;
    border: 2px solid #E8E0F7;
    border-radius: 14px;
    padding: 12px 16px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    min-height: 46px;
    max-height: 120px;
    line-height: 1.4;
    color: var(--dark-text);
    background: var(--gray-light);
  }

  .input-wrapper textarea:focus {
    border-color: var(--purple-mid);
    background: var(--white);
  }

  .input-wrapper textarea::placeholder { color: #B0A8C9; }

  .send-btn {
    width: 46px;
    height: 46px;
    background: linear-gradient(135deg, var(--purple-mid), var(--purple-light));
    color: var(--white);
    border: none;
    border-radius: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(90, 61, 196, 0.3);
  }

  .send-btn:active { transform: translateY(0); }

  .send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* Source links footer */
  .source-bar {
    background: var(--white);
    border-top: 1px solid #F0EBF8;
    padding: 8px 24px;
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 11px;
    color: var(--gray-text);
  }

  .source-bar a {
    color: var(--purple-mid);
    text-decoration: none;
    font-weight: 500;
  }

  .source-bar a:hover { text-decoration: underline; }
</style>
</head>

<div class="header">
  <div class="header-icon">🚨</div>
  <div class="header-text">

  <a href="https://docs.google.com/document/d/1lOUGu4ZamaZLtss-JFIHB-JOs0xnXMy2H7I5NI-g7Pc/edit?tab=t.le3910nsieop" target="_blank">Session #2</a>
  <a href="https://docs.google.com/document/d/1wH7MxN5_ojMkRNeQWC0Ix6QwLTkNWZ2UEdq-FGfA-OM/edit?tab=t.v7pdxdq88tot" target="_blank">Session #3</a>

<div class="step-card"><strong>Step 1: Declare yourself as IC</strong><br>Post: <em>"I'm taking over as Incident Commander. Here's what we're seeing: [impact]. Current status: [investigating/mitigating]. Next update in 30 min."</em><br>Click <strong>Assign Roles</strong> form button &rarr; self-assign as IC.</div>

function getTimeStr() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function addMessage(content, type, showQuickActions) {
  const container = document.getElementById('chatContainer');
  const msgDiv = document.createElement('div');
  msgDiv.className = `message ${type}`;

  const avatar = type === 'bot' ? '🚨' : '👤';
  let html = `<div class="message-avatar">${avatar}</div>
    <div>
      <div class="message-bubble">${content}`;

  if (showQuickActions) {
    html += `<div class="quick-actions">
      <button class="quick-action-btn" onclick="askQuestion('What do I do during an incident?')">During Incident</button>
      <button class="quick-action-btn" onclick="askQuestion('What are the severity levels?')">Severity &amp; SLAs</button>
      <button class="quick-action-btn" onclick="askQuestion('How do I use Rootly?')">Rootly Tooling</button>
      <button class="quick-action-btn" onclick="askQuestion('How do emoji workflows work?')">Emoji Workflows</button>
      <button class="quick-action-btn" onclick="askQuestion('How do I escalate?')">Escalation</button>
      <button class="quick-action-btn" onclick="askQuestion('What happens after an incident?')">After Incident</button>
      <button class="quick-action-btn" onclick="askQuestion('What is my onboarding checklist?')">Onboarding</button>
    </div>`;
  }

  html += `</div><div class="message-time">${getTimeStr()}</div></div>`;
  msgDiv.innerHTML = html;
  container.appendChild(msgDiv);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('chatContainer');
  const typingDiv = document.createElement('div');
  typingDiv.className = 'message bot';
  typingDiv.id = 'typingIndicator';
  typingDiv.innerHTML = `<div class="message-avatar">🚨</div>
    <div><div class="message-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div></div>`;
  container.appendChild(typingDiv);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function findAnswer(input) {
  const lower = input.toLowerCase();
  let bestMatch = null;
  let bestScore = 0;

  for (const [key, entry] of Object.entries(KB)) {
    let score = 0;
    for (const kw of entry.keywords) {
      if (lower.includes(kw)) {
        score += kw.length;
      }
    }
    if (score > bestScore) {
      bestScore = score;
      bestMatch = entry;
    }
  }

  if (bestMatch && bestScore > 3) {
    return bestMatch.answer;
  }

  return `<p>I don't have a specific answer for that in my training knowledge base. Here are some things I can help with:</p>
<div class="quick-actions">
  <button class="quick-action-btn" onclick="askQuestion('What is the IC role?')">IC Role</button>
  <button class="quick-action-btn" onclick="askQuestion('What do I do during an incident?')">During Incident</button>
  <button class="quick-action-btn" onclick="askQuestion('What are the severity levels?')">Severity &amp; SLAs</button>
  <button class="quick-action-btn" onclick="askQuestion('How do I use Rootly?')">Rootly Tooling</button>
  <button class="quick-action-btn" onclick="askQuestion('How do I escalate?')">Escalation</button>
  <button class="quick-action-btn" onclick="askQuestion('What happens after an incident?')">After Incident</button>
  <button class="quick-action-btn" onclick="askQuestion('What is my onboarding checklist?')">Onboarding</button>
</div>
<p>Or check the full <a href="https://fantastic-adventure-y7yw7y9.pages.github.io/" target="_blank">training slide deck</a> for detailed content with images.</p>`;
}

function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, 'user');
  input.value = '';
  input.style.height = 'auto';

  showTyping();

  setTimeout(() => {
    removeTyping();
    const answer = findAnswer(text);
    addMessage(answer, 'bot');
  }, 600 + Math.random() * 400);
}

function askQuestion(q) {
  document.getElementById('userInput').value = q;
  sendMessage();
}

function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
  // Auto-resize
  setTimeout(() => {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
  }, 0);
}
