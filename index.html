<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incident Commander Training Assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --purple-dark: #3A1D8E;
    --purple-mid: #5B3DC4;
    --purple-light: #7C5CE7;
    --purple-bg: #EDE7F6;
    --green-light: #E8F5E9;
    --green-mid: #C8E6C9;
    --green-accent: #4CAF50;
    --orange-accent: #FF6B35;
    --white: #FFFFFF;
    --gray-light: #F5F5F7;
    --gray-text: #6B7280;
    --dark-text: #1A1A2E;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--gray-light);
    height: 100vh;
    display: flex;
    flex-direction: column;
    color: var(--dark-text);
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--purple-dark) 0%, var(--purple-mid) 50%, var(--purple-light) 100%);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 4px 20px rgba(90, 61, 196, 0.3);
    position: relative;
    z-index: 10;
  }

  .header-icon {
    width: 44px;
    height: 44px;
    background: rgba(255,255,255,0.2);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    backdrop-filter: blur(10px);
  }

  .header-text h1 {
    color: var(--white);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .header-text p {
    color: rgba(255,255,255,0.75);
    font-size: 12px;
    margin-top: 2px;
  }

  .header-badge {
    margin-left: auto;
    background: rgba(255,255,255,0.15);
    color: var(--white);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    backdrop-filter: blur(10px);
    letter-spacing: 0.5px;
  }

  /* Chat area */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .chat-container::-webkit-scrollbar { width: 6px; }
  .chat-container::-webkit-scrollbar-track { background: transparent; }
  .chat-container::-webkit-scrollbar-thumb { background: #D1C4E9; border-radius: 3px; }

  /* Messages */
  .message {
    display: flex;
    gap: 10px;
    max-width: 85%;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.bot { align-self: flex-start; }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }

  .message-avatar {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .message.bot .message-avatar {
    background: linear-gradient(135deg, var(--purple-dark), var(--purple-mid));
    color: white;
  }

  .message.user .message-avatar {
    background: linear-gradient(135deg, var(--green-accent), #66BB6A);
    color: white;
  }

  .message-bubble {
    padding: 14px 18px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    position: relative;
  }

  .message.bot .message-bubble {
    background: var(--white);
    border: 1px solid #E8E0F7;
    border-top-left-radius: 4px;
    box-shadow: 0 2px 8px rgba(90, 61, 196, 0.06);
  }

  .message.user .message-bubble {
    background: linear-gradient(135deg, var(--purple-mid), var(--purple-light));
    color: var(--white);
    border-top-right-radius: 4px;
    box-shadow: 0 2px 8px rgba(90, 61, 196, 0.2);
  }

  .message-bubble h3 {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--purple-dark);
  }

  .message-bubble ul, .message-bubble ol {
    margin: 8px 0;
    padding-left: 20px;
  }

  .message-bubble li { margin-bottom: 6px; }

  .message-bubble code {
    background: var(--purple-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    color: var(--purple-dark);
    font-family: 'SF Mono', Monaco, monospace;
  }

  .message-bubble a {
    color: var(--purple-mid);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .message.user .message-bubble a { color: #E8E0F7; }

  .message-bubble .step-card {
    background: var(--green-light);
    border-left: 3px solid var(--green-accent);
    padding: 10px 14px;
    border-radius: 0 8px 8px 0;
    margin: 8px 0;
    font-size: 13px;
  }

  .message-bubble .step-card strong { color: var(--purple-dark); }

  .message-bubble .alert-card {
    background: #FFF3E0;
    border-left: 3px solid var(--orange-accent);
    padding: 10px 14px;
    border-radius: 0 8px 8px 0;
    margin: 8px 0;
    font-size: 13px;
  }

  .message-bubble table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0;
    font-size: 13px;
  }

  .message-bubble th {
    background: var(--purple-bg);
    color: var(--purple-dark);
    padding: 8px 10px;
    text-align: left;
    font-weight: 600;
    font-size: 12px;
  }

  .message-bubble td {
    padding: 8px 10px;
    border-bottom: 1px solid #F0EBF8;
  }

  .message-bubble tr:last-child td { border-bottom: none; }

  .message-time {
    font-size: 11px;
    color: var(--gray-text);
    margin-top: 4px;
    padding: 0 4px;
  }

  .message.user .message-time { text-align: right; }

  /* Quick actions */
  .quick-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }

  .quick-action-btn {
    background: var(--purple-bg);
    color: var(--purple-dark);
    border: 1px solid #D1C4E9;
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .quick-action-btn:hover {
    background: var(--purple-mid);
    color: var(--white);
    border-color: var(--purple-mid);
    transform: translateY(-1px);
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 8px 0;
  }

  .typing-indicator span {
    width: 8px;
    height: 8px;
    background: #B39DDB;
    border-radius: 50%;
    animation: typing 1.4s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Input area */
  .input-area {
    background: var(--white);
    border-top: 1px solid #E8E0F7;
    padding: 16px 24px;
    display: flex;
    gap: 12px;
    align-items: flex-end;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
  }

  .input-wrapper {
    flex: 1;
    position: relative;
  }

  .input-wrapper textarea {
    width: 100%;
    border: 2px solid #E8E0F7;
    border-radius: 14px;
    padding: 12px 16px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    min-height: 46px;
    max-height: 120px;
    line-height: 1.4;
    color: var(--dark-text);
    background: var(--gray-light);
  }

  .input-wrapper textarea:focus {
    border-color: var(--purple-mid);
    background: var(--white);
  }

  .input-wrapper textarea::placeholder { color: #B0A8C9; }

  .send-btn {
    width: 46px;
    height: 46px;
    background: linear-gradient(135deg, var(--purple-mid), var(--purple-light));
    color: var(--white);
    border: none;
    border-radius: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(90, 61, 196, 0.3);
  }

  .send-btn:active { transform: translateY(0); }

  .send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* Source links footer */
  .source-bar {
    background: var(--white);
    border-top: 1px solid #F0EBF8;
    padding: 8px 24px;
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 11px;
    color: var(--gray-text);
  }

  .source-bar a {
    color: var(--purple-mid);
    text-decoration: none;
    font-weight: 500;
  }

  .source-bar a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🚨</div>
  <div class="header-text">
    <h1>Incident Commander Training Assistant</h1>
    <p>Zocdoc Incident Commander Training</p>
  </div>
  <div class="header-badge">ROOTLY &amp; TOOLING</div>
</div>

<div class="chat-container" id="chatContainer">
  <!-- Welcome message injected by JS -->
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea id="userInput" placeholder="Ask me anything about IC training..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
  </div>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#9654;</button>
</div>

<div class="source-bar">
  <span>Sources:</span>
  <a href="https://github.com/Zocdoc/incident-command-training/" target="_blank">Training Repo</a>
  <a href="https://fantastic-adventure-y7yw7y9.pages.github.io/" target="_blank">Slide Deck</a>
  <a href="https://docs.google.com/document/d/1i-sfiPB8GZiyvW7mZDrmxnq3Vw-lupeVj-c250utlVk/edit?tab=t.gvybp59rhjpy" target="_blank">Session #1</a>
  <a href="https://docs.google.com/document/d/1lOUGu4ZamaZLtss-JFIHB-JOs0xnXMy2H7I5NI-g7Pc/edit?tab=t.le3910nsieop" target="_blank">Session #2</a>
  <a href="https://docs.google.com/document/d/1wH7MxN5_ojMkRNeQWC0Ix6QwLTkNWZ2UEdq-FGfA-OM/edit?tab=t.v7pdxdq88tot" target="_blank">Session #3</a>
</div>

<script>
const KB = {
  role: {
    keywords: ['role','what is ic','what does ic do','ic do','responsibility','responsibilities','job','purpose','incident commander is','ic role','what is the ic'],
    answer: `<h3>The IC Role &amp; Responsibilities</h3>
<p>The Incident Commander is the <strong>single decision-maker</strong> during an active incident. The IC is empowered to pull in any team, escalate to any level, and direct all responders.</p>
<div class="step-card"><strong>Core Focus:</strong> Manage chaos, coordinate response, communicate status &mdash; the IC does NOT debug or fix code.</div>
<div class="step-card"><strong>Key Powers:</strong> Page any team, escalate to any level, direct responders, set severity, decide on rollback, authorize status page updates.</div>
<p><strong>IC Responsibilities:</strong></p>
<ul>
<li>Declare yourself as IC &mdash; announce in channel + assign role in Rootly</li>
<li>Assign roles: SME per impacted team, Comms Lead, Scribe</li>
<li>Assess and set severity (SEV1/2/3)</li>
<li>Decide mitigation strategy (rollback, feature flag, failover)</li>
<li>Maintain Executive Summary updates</li>
<li>Manage status page decisions</li>
<li>Create and track action items</li>
<li>Assign Retro Owner before/after resolution</li>
</ul>
<div class="alert-card">&#x1F4A1; Key principle: <strong>"Drive the process, don't debug."</strong> Use the incident-specific Slack channel for all communication. Pin key messages with 📌 for the timeline.</div>
<p><strong>What the IC does NOT do:</strong> Debug code, write the retro document, fix the issue directly, or investigate root cause (that's the SME's job).</p>`
  },

  during_incident: {
    keywords: ['during incident','steps during','checklist','incident now','pulled into','my shift','what do i do','what should i do','active incident','got paged','just got','step by step','what are the steps'],
    answer: `<h3>Incident Checklist &mdash; Step by Step</h3>
<div class="step-card"><strong>Step 1: Declare yourself as IC</strong><br>Announce in the incident channel: <em>"I'm taking over as Incident Commander."</em><br>Assign yourself as IC in Rootly via the Assign Roles button or <code>/incident</code> command.</div>
<div class="step-card"><strong>Step 2: Assign roles &amp; escalate</strong><br>Identify which teams are impacted. Page SMEs via <code>/incident escalate</code> or the Escalate button. Assign a Comms Lead if status page is needed. Create Action Items for urgent tasks.</div>
<div class="step-card"><strong>Step 3: Investigate &amp; assess severity</strong><br>Use the decision tree:<br>
&bull; <strong>Can patients complete a booking? No &rarr; SEV1</strong><br>
&bull; <strong>Are customers noticeably impacted but not blocked? Yes &rarr; SEV2</strong><br>
&bull; <strong>Would most customers notice today? No &rarr; SEV3</strong><br>
Assess blast radius: booking/search/provider availability? All patients or a subset?<br>
Confirm severity, decide on rollback, status page. Identify affected Functionalities/Services. Add Executive Summary. Define Exit Criteria.</div>
<div class="step-card"><strong>Step 4: Mitigate</strong><br>Goal: reduce blast radius, NOT full fix. Examples: roll back deploy, disable feature flag, failover to backup.<br>
<strong>SLAs:</strong> SEV1 &le; 1 hour, SEV2 &le; 4 hours.<br>
Enter <code>/incident mitigate</code>. Update Executive Summary and status page. Post updates every 30&ndash;60 min.</div>
<div class="step-card"><strong>Step 5: Resolve</strong><br>Root cause addressed, metrics back to normal, exit criteria met. Confirm with all responders. Enter <code>/incident resolve</code>. Update summary and status page. Create follow-up action items with 📝. Pin key messages with 📌.</div>
<div class="step-card"><strong>Step 6: Update Executive Summary</strong><br>Include: what went wrong, who was impacted, how mitigated/resolved, booking impact, timeline. SEV1/2: update with every status change. SEV3: within 24hr (72hr on weekends).</div>
<div class="step-card"><strong>Step 7: Assign Retro Owner</strong><br>Assign in Rootly. Create action item for retro within 5 business days.</div>
<div class="step-card"><strong>Step 8: Schedule Retro Meeting</strong><br>Use <code>/incident workflows schedule-retro</code> for SEV1/2. SEV3 is async only.</div>
<div class="step-card"><strong>Step 9: Close OUT Ticket</strong><br>Resolve within 14 days. Confirm retro doc is complete, action items are linked, update status to Done.</div>
<div class="alert-card">&#x26A1; <strong>Remember:</strong> All communication in the incident Slack channel. No side conversations. Delegate technical investigation to SMEs.</div>`
  },

  severity: {
    keywords: ['severity','sev 1','sev 2','sev 3','sev-1','sev-2','sev-3','sev1','sev2','sev3','critical','major','minor','sla','how long','time limit','decision tree','booking blocked','patient impact'],
    answer: `<h3>Severity Definitions &amp; Decision Tree</h3>
<p><strong>The Decision Tree:</strong></p>
<div class="step-card"><strong>Can patients complete a booking? No &rarr; SEV1</strong></div>
<div class="step-card"><strong>Are customers noticeably impacted but not blocked? Yes &rarr; SEV2</strong></div>
<div class="step-card"><strong>Would most customers notice this today? No &rarr; SEV3</strong></div>
<table>
<tr><th>Severity</th><th>Definition</th><th>Mitigation SLA</th><th>Retro Required</th></tr>
<tr><td><strong>SEV1</strong></td><td>Widespread patient impact. Core flows unavailable. Patients CANNOT complete bookings.</td><td>&le; 1 hour</td><td>Meeting + Doc</td></tr>
<tr><td><strong>SEV2</strong></td><td>Partial meaningful impact. Customers noticeably impacted but not fully blocked.</td><td>&le; 4 hours</td><td>Meeting + Doc</td></tr>
<tr><td><strong>SEV3</strong></td><td>Limited/internal impact. Most customers would NOT notice today.</td><td>Best effort</td><td>Doc only (leadership discretion)</td></tr>
</table>
<p><strong>Zocdoc Examples:</strong></p>
<ul>
<li><strong>SEV1:</strong> Search API errors at 30% &mdash; patients can't find providers</li>
<li><strong>SEV2:</strong> Rescheduling failing in NJ only &mdash; impacted but not fully blocked</li>
<li><strong>SEV3:</strong> Profile photos not loading &mdash; cosmetic, patients unlikely to notice today</li>
<li><strong>SEV1:</strong> Booking API down &mdash; 100% of bookings failing</li>
<li><strong>SEV2:</strong> Insurance filter returning empty results in NJ &mdash; 15% of NJ queries</li>
</ul>
<div class="alert-card">&#x2B06;&#xFE0F; <strong>Always round UP</strong> if severity is ambiguous. Consider: booking/search/provider availability? All patients or a subset? What is the blast radius?</div>`
  },

  component_priority: {
    keywords: ['component priority','p1','p2','p3','team priority','service priority','platform risk','hidden p1','internal p1'],
    answer: `<h3>Component Priority (P1/P2/P3)</h3>
<p>Component Priority is a <strong>team-level, service-specific</strong> urgency classification, <strong>independent of incident severity</strong>. A SEV3 incident can have a P1 component.</p>
<table>
<tr><th>Priority</th><th>Definition</th><th>Response</th><th>Escalation</th></tr>
<tr><td><strong>P1 Critical</strong></td><td>Service fully down or imminent platform risk</td><td>All hands on deck</td><td>Escalate to EM immediately</td></tr>
<tr><td><strong>P2 High</strong></td><td>Degraded performance or elevated risk</td><td>On-call responds promptly</td><td>EM aware within 1 hour</td></tr>
<tr><td><strong>P3 Low</strong></td><td>Minor issue, workaround exists</td><td>Business hours</td><td>Track in Jira</td></tr>
</table>
<p><strong>How Severity + Priority Combine (Zocdoc examples):</strong></p>
<ul>
<li><strong>Booking API down:</strong> SEV1 + P1 (patients blocked, service down)</li>
<li><strong>CI/CD risk wiping S3:</strong> SEV3 + P1 (no patient impact yet, but imminent platform risk)</li>
<li><strong>Insurance filter wrong in NJ:</strong> SEV2 + P2 (partial impact, service degraded)</li>
<li><strong>Search slow for one segment:</strong> SEV3 + P2 (minor patient impact)</li>
<li><strong>Profile photos not loading:</strong> SEV3 + P3 (cosmetic, workaround exists)</li>
</ul>
<div class="alert-card">&#x1F525; <strong>Platform Reliability "Hidden P1s":</strong> CI/CD pipeline issues, DB connection pool exhaustion, DNS delays, monitoring gaps, auth degradation, cert expiration, CCPA pipeline stalled. These may be SEV3 but are P1 internally.</div>
<p><strong>When to declare an incident for an internal P1:</strong></p>
<ul>
<li>Could escalate to patient impact within hours</li>
<li>Multiple teams are blocked</li>
<li>Requires cross-team coordination</li>
<li>Time-sensitive risk window</li>
<li>Repeat incident pattern</li>
</ul>`
  },

  rootly: {
    keywords: ['rootly','slack command','incident new','incident list','create incident','form button','tooling','platform','tool','rootly commands','getting started','how to use rootly'],
    answer: `<h3>Rootly Platform &amp; Tooling</h3>
<p>Rootly is Zocdoc's incident management platform, connecting <strong>Slack, PagerDuty, Jira, and Confluence</strong>.</p>
<div class="step-card"><strong>Starting an Incident:</strong> <code>/incident new</code> &rarr; automatically creates: dedicated Slack channel, OUT ticket in Jira, PagerDuty incident, announcement to #incidents.</div>
<p><strong>Incident Channel Buttons</strong> (pinned at top):</p>
<ol>
<li><strong>Update</strong> &mdash; Change severity, executive summary, services, detection time</li>
<li><strong>Escalate</strong> &mdash; Page responders via escalation policy or specific users</li>
<li><strong>Mitigate</strong> &mdash; Mark incident as mitigated</li>
<li><strong>Resolve</strong> &mdash; Mark incident as resolved</li>
<li><strong>Jira</strong> &mdash; Link to OUT ticket</li>
</ol>
<p><strong>Essential Slash Commands:</strong></p>
<ul>
<li><code>/incident new</code> &mdash; Create a new incident</li>
<li><code>/incident escalate</code> &mdash; Page teams via PagerDuty</li>
<li><code>/incident mitigate</code> &mdash; Mark mitigated</li>
<li><code>/incident resolve</code> &mdash; Mark resolved</li>
<li><code>/incident status</code> &mdash; View current status</li>
<li><code>/incident add action item</code> &mdash; Create an action item</li>
<li><code>/incident action items</code> &mdash; List action items</li>
<li><code>/incident timeline &lt;note&gt;</code> &mdash; Add a timeline note</li>
</ul>
<p><strong>Required Fields</strong> (these drive your retro grade):</p>
<ul>
<li>Severity, Executive Summary, Services, Root Cause (20pts)</li>
<li>Detection Method (10pts), Booking Impact (10pts), Customer Impact Type (10pts)</li>
</ul>
<div class="step-card"><strong>Fastest Incident Flow (minimal commands):</strong><br>
1. <code>/incident new</code> (only command you need)<br>
2. IC clicks <strong>Update</strong> &rarr; set severity, summary<br>
3. IC clicks <strong>Escalate</strong> &rarr; page teams<br>
4. SMEs pin 📌 key findings<br>
5. Anyone stars &#x2B50; action items<br>
6. IC clicks <strong>Mitigate</strong><br>
7. IC clicks <strong>Resolve</strong><br>
8. Rootly auto-generates retro doc</div>
<div class="alert-card">&#x1F4A1; <strong>Automated Reports from Rootly:</strong> Daily Incident Digest (#incidents), Outage Action Items (#incidents), EM DMs (your team's incidents), Weekly Retro Grade Scorecard (#incidents).</div>`
  },

  emoji: {
    keywords: ['emoji','pin','star','memo','action item emoji','timeline emoji','jira ticket','export','emoji workflow','shortcuts emoji'],
    answer: `<h3>Emoji Workflows &amp; Shortcuts</h3>
<table>
<tr><th>Emoji</th><th>When to Use</th><th>What Happens</th></tr>
<tr><td>📌 Pin</td><td>Key findings, status changes, decisions</td><td>Added to incident <strong>timeline</strong>. Rootly confirms with &#x2705;</td></tr>
<tr><td>&#x2B50; Star</td><td>During incident &mdash; tasks that need doing</td><td>Marked as <strong>action item</strong>. Rootly confirms with &#x2705;</td></tr>
<tr><td>📝 Memo</td><td>After incident &mdash; follow-up work needed</td><td>Marked as <strong>follow-up action item</strong>. Rootly confirms with &#x2705;</td></tr>
<tr><td>&#x1F525; Fire</td><td>High-priority item</td><td>Flags as <strong>high priority</strong></td></tr>
<tr><td>&#x1F440; Eyes</td><td>Investigating something</td><td>Signals <strong>"looking into it"</strong></td></tr>

  retro: {
    keywords: ['retro','retrospective','retro meeting','retro guide','post-incident retro','blameless','retro format','retro doc','good retro','bad retro','retro timeline'],
    answer: `<h3>Post-Incident Retro Guide</h3>
<p>Retrospectives are <strong>blameless</strong> &mdash; focused on process improvement, not blame.</p>
<p><strong>When Required:</strong></p>
<ul>
<li><strong>SEV1:</strong> Meeting + doc required</li>
<li><strong>SEV2:</strong> Meeting + doc required</li>
<li><strong>SEV3:</strong> At leadership discretion (usually doc-only, async)</li>
</ul>
<p><strong>Meeting Format (30&ndash;45 min):</strong></p>
<div class="step-card"><strong>1. Set the Tone (2 min)</strong> &mdash; Emphasize blameless culture</div>
<div class="step-card"><strong>2. Timeline Walkthrough (10 min)</strong> &mdash; Detection &rarr; IC engaged &rarr; Investigation &rarr; Mitigation &rarr; Resolution. Key question: <em>Where were the biggest time gaps?</em></div>
<div class="step-card"><strong>3. Root Cause Analysis (10 min)</strong> &mdash; Was it code defect, config change, capacity issue, dependency failure, or process gap? Is this a repeat incident? Why didn't existing safeguards prevent it?</div>
<div class="step-card"><strong>4. Detection &amp; Response Review (5 min)</strong> &mdash; Was detection automated or manual? What was TTD (time to detect) and TTM (time to mitigate)? Was SLA met?</div>
<div class="step-card"><strong>5. Impact Assessment (5 min)</strong> &mdash; Booking and customer impact. How many patients affected? Was status page timing appropriate?</div>
<div class="step-card"><strong>6. Action Items (10 min)</strong> &mdash; Define: what, who, when, where (Jira). Types: fix root cause, add monitoring, add safeguards, update runbooks, improve testing. Worth <strong>25 pts</strong> on retro grade!</div>
<div class="step-card"><strong>7. Close (3 min)</strong> &mdash; Confirm action items in Jira, retro doc complete, OUT ticket updated.</div>
<p><strong>Attendees:</strong> Retro Owner, IC, SMEs, EMs, Engineering Leadership (SEV1), PX/ProvX if customer-impacting.</p>
<div class="alert-card">&#x2705; <strong>Good retro:</strong> Blameless, specific, actionable, time-bound, complete.<br>
&#x274C; <strong>Bad retro:</strong> "Be more careful," no action items, root cause listed as "unknown," meeting skipped, action items never completed.</div>`

<div class="step-card"><strong>Mitigated</strong> = Bleeding stopped, blast radius reduced, but <strong>root cause NOT yet fixed</strong>. This is a temporary state.<br>

function getTimeStr() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function addMessage(content, type, showQuickActions) {
  const container = document.getElementById('chatContainer');
  const msgDiv = document.createElement('div');
  msgDiv.className = `message ${type}`;

  const avatar = type === 'bot' ? '🚨' : '👤';
  let html = `<div class="message-avatar">${avatar}</div>
    <div>
      <div class="message-bubble">${content}`;

  if (showQuickActions) {
    html += `<div class="quick-actions">
      <button class="quick-action-btn" onclick="askQuestion('What do I do during an incident?')">During Incident</button>
      <button class="quick-action-btn" onclick="askQuestion('What are the severity levels?')">Severity Levels</button>
      <button class="quick-action-btn" onclick="askQuestion('How do I use Rootly?')">Rootly Tooling</button>
      <button class="quick-action-btn" onclick="askQuestion('How do I escalate?')">Escalation</button>
      <button class="quick-action-btn" onclick="askQuestion('What are the incident roles?')">Incident Roles</button>
      <button class="quick-action-btn" onclick="askQuestion('Show me the service lookup table')">Service Lookup</button>
      <button class="quick-action-btn" onclick="askQuestion('How does retro grading work?')">Retro Grades</button>
      <button class="quick-action-btn" onclick="askQuestion('What is the status page process?')">Status Page</button>
      <button class="quick-action-btn" onclick="askQuestion('Show me the Slack cheat sheet')">Cheat Sheet</button>
      <button class="quick-action-btn" onclick="askQuestion('What is my onboarding checklist?')">Onboarding</button>
    </div>`;
  }

  html += `</div><div class="message-time">${getTimeStr()}</div></div>`;
  msgDiv.innerHTML = html;
  container.appendChild(msgDiv);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('chatContainer');
  const typingDiv = document.createElement('div');
  typingDiv.className = 'message bot';
  typingDiv.id = 'typingIndicator';
  typingDiv.innerHTML = `<div class="message-avatar">🚨</div>
    <div><div class="message-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div></div>`;
  container.appendChild(typingDiv);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function findAnswer(input) {
  const lower = input.toLowerCase();
  let bestMatch = null;
  let bestScore = 0;

  for (const [key, entry] of Object.entries(KB)) {
    let score = 0;
    for (const kw of entry.keywords) {
      if (lower.includes(kw)) {
        score += kw.length;
      }
    }
    if (score > bestScore) {
      bestScore = score;
      bestMatch = entry;
    }
  }

  if (bestMatch && bestScore > 3) {
    return bestMatch.answer;
  }

  return `<p>I don't have a specific answer for that in my training knowledge base. Here are some things I can help with:</p>
<div class="quick-actions">
  <button class="quick-action-btn" onclick="askQuestion('What is the IC role?')">IC Role</button>
  <button class="quick-action-btn" onclick="askQuestion('What do I do during an incident?')">During Incident</button>
  <button class="quick-action-btn" onclick="askQuestion('What are the severity levels?')">Severity Levels</button>
  <button class="quick-action-btn" onclick="askQuestion('How do I use Rootly?')">Rootly Tooling</button>
  <button class="quick-action-btn" onclick="askQuestion('How do I escalate?')">Escalation</button>
  <button class="quick-action-btn" onclick="askQuestion('What are the incident roles?')">Incident Roles</button>
  <button class="quick-action-btn" onclick="askQuestion('Show me the service lookup table')">Service Lookup</button>
  <button class="quick-action-btn" onclick="askQuestion('What happens after an incident?')">After Incident</button>
  <button class="quick-action-btn" onclick="askQuestion('Show me the Slack cheat sheet')">Cheat Sheet</button>
  <button class="quick-action-btn" onclick="askQuestion('What is my onboarding checklist?')">Onboarding</button>
</div>
<p>Or check the <a href="https://github.com/Zocdoc/incident-command-training/" target="_blank">training repo</a> for the full source material.</p>`;
}

function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, 'user');
  input.value = '';
  input.style.height = 'auto';

  showTyping();

  setTimeout(() => {
    removeTyping();
    const answer = findAnswer(text);
    addMessage(answer, 'bot');
  }, 600 + Math.random() * 400);
}

function askQuestion(q) {
  document.getElementById('userInput').value = q;
  sendMessage();
}

function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
  // Auto-resize
  setTimeout(() => {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
  }, 0);
}
